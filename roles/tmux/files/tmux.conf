# Appearence                                                        {{{
# =====================================================================
# #{=5:pane_title} : limits - no more then 5 chars.
# #S : session name
# #I : window number
# #W : current application being run
# #T : pane (terminal) title
# #F : window flags
#
# =====================================================================
# Patterns:
# ---------
#
# How set pane title:
# printf '\033]2;%s\033\\' 'title goes here'
#
# #{?#F,#F, } : show window flag or space
#
# =====================================================================
# Colors:
# -------
#
# yellow='#fabd2f'
# yellow='#FAC42F'
# yellow='#FAD82F'
#
# =====================================================================

# Terminal emulator window title
set -g set-titles on
# set -g set-titles-string "#S:#I:#W - \"#T\" #{session_alerts}"  # default
set -g set-titles-string "#W #{?#T, #T,} #{session_alerts}"
# set -g set-titles-string '#W #T'

# Use hostname (@#h) in set-titles-string with SSH.
# if-shell 'test -n "$SSH_CONNECTION"' 'set -g set-titles-string "[#S:#I.#P @#h:tmux] #T"' 'set -g set-titles-string "[#S:#I.#P:tmux] #T"'

# Allow programs to change the window name using a terminal escape sequence (\ek...\e\\).
# Since tmux v2.7, this option was turned off by default.
setw -g allow-rename on
setw -g automatic-rename on  # rename window to reflect current program
# set -g automatic-rename-format '#{b:pane_current_path}'

set -g status-interval 1

setw -g window-status-format '#I #{?#T,#T,#W}#{?#F,#F, }'
setw -g window-status-current-format '#I #{?#T,#T,#W}#F'  # used when window in current window
# setw -g window-status-current-format '#I:#W#{?#T, #T,}#F'  # used when window in current window

# setw -g window-status-format                    '#[fg=default] #{window_panes} #{pane_current_command} '
# setw -g window-status-current-format '#[bg=colour7 fg=colour0] #{window_panes} #{pane_current_command} '


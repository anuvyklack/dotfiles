---

- name: Install prerequisites
  become: yes
  apt:
    pkg:
      - curl
      - jq
    state: present
    update_cache: yes

- name: Install bin
  include: bin.yaml

- name: Symlink bat config files
  file:
    src: "{{ files }}/bat"
    dest: "{{ config }}/bat"
    state: link

- name: Symlink ripgrep config files
  file:
    src: "{{ files }}/ripgrep"
    dest: "{{ config }}/rg"
    state: link

- name: Symlink topgrade config files
  file:
    src: "{{ files }}/topgrade.toml"
    dest: "{{ config }}/topgrade.toml"
    state: link

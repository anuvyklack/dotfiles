- name: install stow (apt)
  become: yes
  become_user: root
  become_method: sudo
  apt:
    name: stow
    state: present
    force_apt_get: yes
    update_cache: yes
    cache_valid_time: 3600  # One hour
  when: ansible_pkg_mgr == 'apt'

# https://sw.kovidgoyal.net/kitty/binary/
- name: Download latest kitty release
  shell:
    cmd: "curl -L https://sw.kovidgoyal.net/kitty/installer.sh | sh /dev/stdin dest={{ stow_dir }} launch=n"
    warn: false  # Do not rise warning about curl.

- name: Delete empty folders in 'kitty.app' directory
  command:
    cmd: find -type d -empty -delete
    chdir: "{{ stow_dir }}/kitty.app"


- name: stow kitty application
  command:
    cmd: stow -R kitty.app
    chdir: "{{ stow_dir }}"


- name: Make sure kitty config directories exist
  file:
    dest: "{{ item }}"
    state: directory
  loop:
    - "{{ config }}"
    - "{{ config }}/color_themes"

# - debug:
#     var: "{{ item }}"
#   with_filetree: "{{ role_path }}/files"

- name: Symlink kitty config files
  file:
    src: "{{ role_files }}/kitty.conf"
    dest: "{{ config }}/kitty.conf"
    state: link

# - name: Symlink kitty config files
#   file:
#     src: "{{ role_files }}/{{ item }}"
#     dest: "{{ config }}/{{ item }}"
#     state: link
#   loop:
#     - kitty.conf
#     - onedark.conf

- name: Symlink kitty custom color_themes
  file:
    src: "{{ item.src }}"
    dest: "{{ config }}/color_themes/{{ item.path }}"
    state: link
  with_filetree: "{{ role_files }}/color_themes"
  loop_control:
    label: "~/.config/kitty/color_themes/{{ item.path }}"

- name: git clone color themes
  git:
    repo: "{{ item.repo }}"
    dest: "{{ config }}/color_themes/{{ item.dest }}"
  loop:
    - { repo: "https://github.com/kovidgoyal/kitty-themes.git", dest: kitty-themes }
  loop_control:
    label: "{{ item.dest }}"


- name: git clone kittens
  git:
    repo: "{{ item.repo }}"
    dest: "{{ config }}/kittens/{{ item.dest }}"
  loop:
    - { repo: "https://github.com/yurikhan/kitty-smart-tab.git", dest: kitty-smart-tab }
  loop_control:
    label: "{{ item.dest }}"

- name: Symlink kittens files
  file:
    src: "{{ config }}/kittens/{{ item.kitten }}/{{ item.file }}"
    dest: "{{ config }}/{{ item.file }}"
    state: link
  loop:
    - { kitten: kitty-smart-tab, file: smart_tab.py }
  loop_control:
    label: "{{ item.kitten }}/{{ item.file }}"



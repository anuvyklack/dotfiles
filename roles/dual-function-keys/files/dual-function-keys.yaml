# /etc/interception-tools/dual-function-keys.yaml
TIMING:
  TAP_MILLISEC: 200
  DOUBLE_TAP_MILLISEC: 0

MAPPINGS:
  - KEY: KEY_SPACE
    TAP: KEY_SPACE
    HOLD: KEY_LEFTCTRL

  # - KEY: KEY_SPACE
  #   TAP: KEY_SPACE
  #   HOLD: KEY_LEFTSHIFT

  # - KEY: KEY_ENTER
  #   TAP: KEY_ENTER
  #   HOLD: KEY_LEFTALT

  - KEY: KEY_ESC
    TAP: KEY_ESC
    HOLD: KEY_LEFTCTRL

  - KEY: KEY_CAPSLOCK
    TAP: KEY_ESC
    HOLD: KEY_LEFTCTRL

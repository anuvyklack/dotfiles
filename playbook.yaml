---
- name: Set up local workstation
  hosts: local
  roles:

    # - role: test
    #   tags:
    #     - test

    - role: hidpi
      tags:
        - hidpi

    - role: apt
      when: ansible_pkg_mgr == 'apt'
      tags:
        - apt

    - role: git
      tags:
         git

    - role: kitty
      tags:
        - kitty

    - role: cli-tools
      tags:
        - cli-tools

    - role: tmux
      tags:
        - tmux

    - role: zsh
      tags:
        - zsh

    - role: ranger
      tags:
        - ranger

    - role: vifm
      tags:
        - vifm

    - role: nnn
      tags:
        - nnn

    - role: miniconda
      tags:
        - miniconda

    - role: neovim
      tags:
        - neovim

    - role: nodejs
      tags:
        - nodejs
      when: ansible_pkg_mgr == 'apt'

    - role: power-managment
      tags:
        - power-managment

    - role: gnome3
      tags:
        - gnome

    - role: dual-function-keys
      tags:
        - keyboard

    - role: vivaldi
      tags:
        - vivaldi
